# SQLite (development/test) + PostgreSQL (production)
#
# 開発・テスト環境: SQLite3（セットアップ不要で手軽）
# 本番環境: PostgreSQL（同時アクセス対応、データ整合性）

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 15 } %>
  timeout: 5000

# --- 開発環境 ---
development:
  <<: *default
  adapter: sqlite3
  database: <%= Rails.root.join('db', 'development.sqlite3').to_s %>
  variables:
    journal_mode: WAL
    synchronous: NORMAL

# --- テスト環境 ---
test:
  <<: *default
  adapter: sqlite3
  database: db/test.sqlite3

# --- 本番環境 ---
# DATABASE_URL が設定されている場合はそちらが優先される（Render/Heroku等）
production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 15 } %>
  url: <%= ENV['DATABASE_URL'] %>
  # DATABASE_URLが未設定の場合の個別設定
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>
  database: <%= ENV.fetch('DB_NAME', 'ai_interviewer_production') %>
  username: <%= ENV.fetch('DB_USERNAME', 'ai_interviewer') %>
  password: <%= ENV['DB_PASSWORD'] %>

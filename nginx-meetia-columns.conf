# meetia.pro — /columns → drafity ai_sales_agent
# 親LPはトップ(/)と同じなので X-Brand-Lp-Path は不要
# パンくず: トップ → AI商談代行記事一覧 → 記事

location ^~ /columns {
    proxy_set_header Host drafity.pro;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Accept-Encoding "";
    proxy_pass https://drafity.pro/ai_sales_agent/columns;
    proxy_ssl_server_name on;
    proxy_redirect https://drafity.pro/ https://meetia.pro/;
    proxy_read_timeout 90;

    sub_filter_types text/html text/css application/javascript;
    sub_filter 'https://drafity.pro' 'https://meetia.pro';
    sub_filter 'http://drafity.pro' 'https://meetia.pro';
    sub_filter '/assets_ok/' '/remote-assets/';
    sub_filter '/assets/' '/remote-assets/';
    sub_filter '/ai_sales_agent/columns' '/columns';
    sub_filter_once off;
    proxy_cookie_domain drafity.pro meetia.pro;
}
